<form id="cadastro-funcionario-form">
    <h2>Cadastro de Funcionário</h2>
    <div class="form-group">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" required>
    </div>
    <div class="form-group">
        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" required>
    </div>
    <div class="form-group">
        <label for="rg">RG:</label>
        <input type="text" id="rg" required>
    </div>
    <div class="form-group">
        <label for="filiacao">Nome da Mãe:</label>
        <input type="text" id="filiacao">
    </div>
    <div class="form-group">
        <label for="cep">CEP:</label>
        <input type="text" id="cep" required>
    </div>
    <div class="form-group">
        <label for="logradouro">Logradouro:</label>
        <input type="text" id="logradouro" required>
    </div>
    <div class="form-group">
        <label for="numero">Número:</label>
        <input type="text" id="numero" required>
    </div>
    <div class="form-group">
        <label for="bairro">Bairro:</label>
        <input type="text" id="bairro" required>
    </div>
    <div class="form-group">
        <label for="cidade">Cidade:</label>
        <input type="text" id="cidade" required>
    </div>
    <div class="form-group">
        <label for="estado">Estado:</label>
        <input type="text" id="estado" required>
    </div>
    <div class="form-group">
        <label for="telefone">Telefone:</label>
        <input type="text" id="telefone">
    </div>
    <div class="form-group">
        <label for="email">E-mail:</label>
        <input type="email" id="email" required>
    </div>
    <div class="form-group">
        <label for="cargo_admitido">Cargo Admitido:</label>
        <input type="text" id="cargo_admitido" required>
    </div>
    <div class="form-group">
        <label for="salario">Salário:</label>
        <input type="number" step="0.01" id="salario" required>
    </div>
    <div class="form-group">
        <label for="data_admissao">Data de Admissão:</label>
        <input type="date" id="data_admissao" required>
    </div>
    <button id="submit-btn" class="btn" type="submit" disabled>Cadastrar Funcionário</button>
    <p id="error-message"></p>
</form>
</section>
