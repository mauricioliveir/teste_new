<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENAC - Programa de Simulação</title>
    <link rel="stylesheet" href="./styles/styles-index.css">
</head>
<body class="sidebar-page"> <!-- Adicione uma classe específica para essa página -->
    <header>
        <img src="./assets/senac-logo-0.png" alt="Logo">
        <button id="logout-button">Sair</button>
    </header>

    <!-- Barra lateral -->
    <aside class="sidebar">
        <nav>
            <ul>
                <li><span class="disabled">Home</span></li>
                <li><a href="./pages/finaceiro.html">Financeiro</a></li>
                <li><a href="./pages/dep-pessoal.html">Departamento Pessoal</a></li>
                <li><a href="./pages/vendas.html">Vendas</a></li>
                <li><a href="./pages/estoque.html">Estoque</a></li>
            </ul>
        </nav>
    </aside>

    <main>
        <section>
            <h1>Bem-vindo ao Sistema SENAC</h1>
            <p>HOME</p>
            
        </section>
    </main>

    <script>
        // Verifica se o usuário está logado usando sessionStorage
        const isLoggedIn = sessionStorage.getItem('isLoggedIn');
        if (!isLoggedIn || isLoggedIn !== 'true') {
            // Redireciona para a página de login se não estiver logado
            window.location.href = "login.html";
        }

        // Adiciona funcionalidade ao botão de logout
        document.getElementById('logout-button').addEventListener('click', function() {
            // Remove o estado de login
            sessionStorage.removeItem('isLoggedIn');
            // Redireciona para a página de login
            window.location.href = "login.html";
        });
    </script>
</body>
</html>
