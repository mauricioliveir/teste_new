<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENAC - Programa de Simulação</title>
    <link rel="stylesheet" href="./styles/styles.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Financeiro</a></li>
                <li><a href="#">Recursos Humanos</a></li>
                <li><a href="#">Vendas</a></li>
                <li><a href="#">Estoque</a></li>
            </ul>
        </aside>
        <main class="content">
            <header>
                <img src="./assets/senac-logo-0.png" alt="Logo">
            </header>
            <section>
                <h1>Bem-vindo ao Sistema SENAC</h1>
                <p>Selecione uma das opções no menu lateral para acessar as páginas.</p>
                <button id="logout-button">Sair</button>
            </section>
            <footer class="footer">
                <p>Desenvolvido por Mauricio</p>
            </footer>
        </main>
    </div>

    <script>
        const isLoggedIn = sessionStorage.getItem('isLoggedIn');
        if (!isLoggedIn || isLoggedIn !== 'true') {
            window.location.href = "login.html";
        }
        document.getElementById('logout-button').addEventListener('click', function() {
            sessionStorage.removeItem('isLoggedIn');
            window.location.href = "login.html";
        });
    </script>
</body>
</html>
