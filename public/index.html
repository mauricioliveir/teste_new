<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENAC - Programa de Simulação</title>
    <link rel="stylesheet" href="./styles/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <img src="./assets/senac-logo-0.png" alt="Logo">
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Financeiro</a></li>
                <li><a href="#">Departamento Pessoal</a></li>
                <li><a href="#">Vendas</a></li>
                <li><a href="#">Estoque</a></li>
            </ul>
        </nav>
        <div class="user-menu">
            <span id="username">Usuário</span>
            <i class="fas fa-user-circle" id="user-icon"></i>
            <div class="dropdown-content">
                <a href="#" id="logout-link">Logout</a>
            </div>
        </div>
    </header>
    <main>
        <section>
            <h1>Bem-vindo ao Sistema SENAC</h1>
            <p>Selecione uma das opções no menu acima para acessar as páginas.</p>
        </section>
    </main>
    <footer class="footer">
        <p>Desenvolvido por Mauricio</p>
    </footer>

    <script>
        // Verifica se o usuário está logado
        const isLoggedIn = localStorage.getItem('isLoggedIn');
        if (!isLoggedIn || isLoggedIn !== 'true') {
            // Redireciona para a página de login se não estiver logado
            window.location.href = "login.html";
        }

        // Adiciona funcionalidade ao botão de logout
        document.getElementById('logout-link').addEventListener('click', function() {
            // Remove o estado de login
            localStorage.removeItem('isLoggedIn');
            // Redireciona para a página de login
            window.location.href = "login.html";
        });

        // Exibe o nome do usuário
        const username = localStorage.getItem('username');
        if (username) {
            document.getElementById('username').textContent = username;
        }

        // Mostra/oculta o dropdown de logout
        document.getElementById('user-icon').addEventListener('click', function() {
            document.querySelector('.dropdown-content').classList.toggle('show');
        });

        // Fecha o dropdown se clicar fora dele
        window.onclick = function(event) {
            if (!event.target.matches('#user-icon')) {
                var dropdowns = document.getElementsByClassName("dropdown-content");
                for (var i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.classList.contains('show')) {
                        openDropdown.classList.remove('show');
                    }
                }
            }
        }
    </script>
</body>
</html>
